name: Validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: '3.14'

      - name: Compile Python files
        run: python -m compileall -q -b custom_components/dawarich_device_tracker

      - name: Validate JSON files
        run: |
          python -m json.tool hacs.json >/dev/null
          python -m json.tool custom_components/dawarich_device_tracker/manifest.json >/dev/null
          python -m json.tool custom_components/dawarich_device_tracker/strings.json >/dev/null
          python -m json.tool custom_components/dawarich_device_tracker/translations/en.json >/dev/null
          python -m json.tool release-please-config.json >/dev/null
          python -m json.tool .release-please-manifest.json >/dev/null
